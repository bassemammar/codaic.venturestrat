# VentureStrat Application Services
services:
  # Registry Service
  registry-service:
    build:
      context: .
      dockerfile: ./services/registry-service/Dockerfile
      target: development
    container_name: venturestrat-registry-service
    environment:
      SERVICE_NAME: registry-service
      SERVICE_VERSION: "1.0.0"
      HOST: "0.0.0.0"
      PORT: "8080"
      DATABASE_URL: "postgresql://venturestrat:venturestrat_dev_password@venturestrat-postgres:5432/venturestrat"
      CONSUL_HOST: venturestrat-consul-server-1
      CONSUL_PORT: "8500"
      KAFKA_BOOTSTRAP_SERVERS: "venturestrat-kafka:29092"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "console"
      TRACING_ENABLED: "false"
      PLATFORM_MODE: "standalone"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4000,http://localhost:5178"
    expose:
      - "8080"
    networks:
      - venturestrat-network
    depends_on:
      venturestrat-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
      target: development
    container_name: venturestrat-auth-service
    environment:
      SERVICE_NAME: auth-service
      SERVICE_VERSION: "1.0.0"
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_URL: "postgresql://venturestrat:venturestrat_dev_password@venturestrat-postgres:5432/venturestrat"
      CONSUL_HOST: venturestrat-consul-server-1
      CONSUL_PORT: "8500"
      KAFKA_BOOTSTRAP_SERVERS: "venturestrat-kafka:29092"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "console"
      TRACING_ENABLED: "false"
      PLATFORM_MODE: "standalone"
      JWT_SECRET_KEY: "venturestrat-dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4000,http://localhost:5178"
    ports:
      - "8106:8000"
    networks:
      - venturestrat-network
    depends_on:
      venturestrat-postgres:
        condition: service_healthy
      registry-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Event Monitor Service
  event-monitor:
    build:
      context: .
      dockerfile: ./services/event-monitor/Dockerfile
    container_name: venturestrat-event-monitor
    environment:
      SERVICE_NAME: event-monitor
      SERVICE_VERSION: "1.0.0"
      HOST: "0.0.0.0"
      PORT: "8101"
      DATABASE_URL: "postgresql://venturestrat:venturestrat_dev_password@venturestrat-postgres:5432/venturestrat"
      KAFKA_BOOTSTRAP_SERVERS: "venturestrat-kafka:29092"
      SERVICES_DIR: "/app/services"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "console"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4000,http://localhost:5178"
    ports:
      - "8101:8101"
    networks:
      - venturestrat-network
    depends_on:
      venturestrat-postgres:
        condition: service_healthy
      venturestrat-kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8101/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Forge Requirements Service
  forge:
    build:
      context: .
      dockerfile: ./services/forge/Dockerfile
    container_name: venturestrat-forge
    environment:
      SERVICE_NAME: forge
      SERVICE_VERSION: "1.0.0"
      HOST: "0.0.0.0"
      PORT: "8000"
      DATABASE_URL: "postgresql://venturestrat:venturestrat_dev_password@venturestrat-postgres:5432/venturestrat"
      REDIS_URL: "redis://venturestrat-redis:6379/7"
      AUTH_SERVICE_URL: "http://venturestrat-auth-service:8000"
      JWT_SECRET_KEY: "venturestrat-dev-secret-change-in-production"
      PLATFORM_NAME: "venturestrat"
      PLATFORM_ROOT: "/app"
      LOG_LEVEL: "INFO"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:4000,http://localhost:5178"
    ports:
      - "8150:8000"
    networks:
