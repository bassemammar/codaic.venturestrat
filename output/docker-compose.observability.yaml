# VentureStrat Observability Stack
# Prometheus + Grafana + Loki + Promtail for monitoring
#
# Usage:
#   docker compose -f docker-compose.observability.yaml up -d
#
#   Grafana:    http://localhost:3001 (admin/admin)
#   Prometheus: http://localhost:9090

services:
  # Prometheus — Metrics Collection
  venturestrat-prometheus:
    image: prom/prometheus:v2.48.0
    container_name: venturestrat-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - venturestrat-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Grafana — Dashboards & Visualization
  venturestrat-grafana:
    image: grafana/grafana:10.2.0
    container_name: venturestrat-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_ROOT_URL: http://localhost:3001
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_LOG_MODE: console
      GF_LOG_LEVEL: info
      GF_ALERTING_ENABLED: false
      GF_UNIFIED_ALERTING_ENABLED: true
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - venturestrat-network
    depends_on:
      venturestrat-prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    user: "472"

  # Loki — Log Aggregation
  venturestrat-loki:
    image: grafana/loki:2.9.0
    container_name: venturestrat-loki
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    networks:
      - venturestrat-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Promtail — Log Shipping
  venturestrat-promtail:
    image: grafana/promtail:2.9.0
    container_name: venturestrat-promtail
    command: -config.file=/etc/promtail/promtail-config.yaml
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - venturestrat-network
    depends_on:
      venturestrat-loki:
        condition: service_healthy
    restart: unless-stopped

networks:
  venturestrat-network:
    external: true

volumes:
  prometheus-data:
    name: venturestrat-prometheus-data
  grafana-data:
    name: venturestrat-grafana-data
  loki-data:
    name: venturestrat-loki-data
