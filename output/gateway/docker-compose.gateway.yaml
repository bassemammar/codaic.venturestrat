services:
  kong:
    image: kong:3.5
    container_name: kong-gateway
    environment:
      # Database-less mode with declarative configuration
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yaml

      # Proxy configuration
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"

      # DNS resolver for Consul service discovery
      KONG_DNS_RESOLVER: "consul-server-1:8600"
      KONG_DNS_ORDER: "SRV,A,CNAME"
      KONG_DNS_STALE_TTL: 60

      # Logging configuration
      KONG_LOG_LEVEL: info
      KONG_PROXY_ACCESS_LOG_FORMAT: '{"timestamp":"$time_iso8601","client_ip":"$remote_addr","method":"$request_method","uri":"$request_uri","status":"$status","size":"$body_bytes_sent","response_time":"$request_time","upstream_time":"$upstream_response_time","correlation_id":"$http_x_correlation_id","consumer":"$http_x_consumer_username"}'

      # Performance tuning
      KONG_WORKER_PROCESSES: auto
      KONG_WORKER_CONNECTIONS: 1024
      KONG_UPSTREAM_KEEPALIVE_POOL_SIZE: 60
      KONG_UPSTREAM_KEEPALIVE_MAX_REQUESTS: 100
      KONG_UPSTREAM_KEEPALIVE_IDLE_TIMEOUT: 60

      # Security
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
      KONG_TRUSTED_IPS: "0.0.0.0/0,::/0"

      # Plugin configuration
      KONG_PLUGINS: bundled
      KONG_PLUGINSERVER_NAMES: ""

    volumes:
      - ./gateway/kong.yaml:/kong/kong.yaml:ro
      - ./gateway/certs:/kong/certs:ro
      - ./gateway/plugins:/kong/plugins:ro
      # Wave 13: Mount protos directory for gRPC-Web transcoding
      - ./gateway/protos:/kong/protos:ro
    ports:
      - "8000:8000"   # Proxy HTTP
      - "8443:8443"   # Proxy HTTPS
      - "8001:8001"   # Admin API (dev only - should be firewalled in production)
    networks:
      - venturestrat-network
    depends_on:
      consul-server-1:
        condition: service_healthy
      redis:
        condition: service_healthy
      health-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  # JWT issuer service for service-to-service authentication
  jwt-issuer:
    build:
      context: ./gateway/jwt-issuer
      dockerfile: Dockerfile
    container_name: jwt-issuer
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_ISSUER: venturestrat-gateway
      JWT_ALGORITHM: HS256
      JWT_EXPIRY_HOURS: 1
      LOG_LEVEL: INFO
    ports:
      - "8002:8000"   # JWT issuer API
    networks:
      - venturestrat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'

  # Health service for gateway health endpoint
  health-service:
    build:
      context: ./gateway/health-service
      dockerfile: Dockerfile
    container_name: health-service
    environment:
      PORT: 8003
      ENVIRONMENT: production
    ports:
      - "8003:8003"   # Health service API
    networks:
      - venturestrat-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
          cpus: '0.05'

networks:
  venturestrat-network:
    external: true
