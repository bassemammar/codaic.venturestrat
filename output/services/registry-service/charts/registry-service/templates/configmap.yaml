{{- if .Values.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "registry-service.fullname" . }}
  labels:
    {{- include "registry-service.labels" . | nindent 4 }}
data:
  # Health check defaults
  HEALTH_CHECK_INTERVAL: "10"
  HEALTH_CHECK_TIMEOUT: "5"
  DEREGISTER_AFTER: "60"
  {{- with .Values.configMap.data }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}
