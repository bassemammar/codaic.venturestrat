# Default values for registry-service
# This is a YAML-formatted file.

replicaCount: 2

image:
  repository: venturestrat/registry-service
  pullPolicy: IfNotPresent
  tag: ""  # Overrides appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
      - ALL

# Service configuration
service:
  type: ClusterIP
  restPort: 8080
  grpcPort: 50051

# Ingress (optional, usually behind API Gateway)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: registry.venturestrat.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource limits
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Consul configuration
consul:
  enabled: true
  host: consul-server
  port: 8500
  scheme: http
  # Use external Consul if not deploying with chart
  external:
    enabled: false
    hosts: []

# Kafka configuration
kafka:
  bootstrapServers: kafka:9092
  topic:
    lifecycle: platform.services.lifecycle

# PostgreSQL configuration
postgresql:
  host: registry-postgresql
  port: 5432
  database: registry
  username: registry
  # Password should be provided via secret
  existingSecret: registry-postgresql-secret
  existingSecretKey: password

# Health probes
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Environment variables
env:
  LOG_LEVEL: INFO

# ConfigMap for additional configuration
configMap:
  enabled: true
  data: {}

# Prometheus metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s
