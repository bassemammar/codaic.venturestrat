# Registry Service Manifest
# Service Registry and Discovery for VentureStrat platform

name: registry-service
version: 0.1.0
description: Service Registry and Discovery for VentureStrat

# No dependencies - this is a foundational service
depends: []

# What this service provides to other services
provides:
  apis:
    rest: /api/v1/services
  events:
    - registry.service.registered
    - registry.service.deregistered
    - registry.service.health_changed

# Health check endpoints
health:
  liveness: /health/live
  readiness: /health/ready
  interval: 10
  timeout: 5
  deregister_after: 60

# Resource requirements
resources:
  cpu: 100m-1000m
  memory: 256Mi-1Gi
  replicas: 1-3

# Observability configuration
observability:
  tier: fast
  metrics:
    enabled: true
    endpoint: /metrics
    histogram_buckets: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5]
    slo:
      p95_target_ms: 50
      p99_target_ms: 100
  logging:
    enabled: true
    level: INFO
    structured: true
    correlation_id: true
    sensitive_data_masking: true
  tracing:
    enabled: true
    sampling_rate: 0.01
    otlp_endpoint: http://jaeger:4317
  consul_tags:
    - metrics

# Testing configuration
testing:
  markers:
    - unit
    - integration
  coverage_threshold: 80
  gates:
    - lint
    - typecheck
  timeout: 300

# Tags for filtering
tags:
  - platform
  - registry
  - infrastructure

# Metadata
metadata:
  team: platform
  oncall: platform-team@venturestrat.com
  documentation: https://docs.venturestrat.com/registry-service
