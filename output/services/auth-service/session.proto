// Session Service - gRPC API
// Active user session with token tracking

syntax = "proto3";

package venturestrat.default.v1;

// Go package option
option go_package = "github.com/venturestrat/default/pkg/api/v1";

// Python generic services disabled
option py_generic_services = false;

// Common imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// Session Service
// =============================================================================

service SessionService {
  // CRUD operations
  rpc CreateSession(CreateSessionRequest) returns (Session);
  rpc GetSession(GetSessionRequest) returns (Session);
  rpc UpdateSession(UpdateSessionRequest) returns (Session);
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  // List operations
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
}

// =============================================================================
// Request/Response Messages
// =============================================================================

// Create Session
message CreateSessionRequest {
  string user_id = 1;  // User who owns this session
  string token_hash = 2;  // SHA256 hash of the access token
  optional string refresh_token_hash = 3;  // SHA256 hash of the refresh token
  optional string ip_address = 4;  // Client IP address
  optional string user_agent = 5;  // Client user agent string
  bool is_active = 6;  // Whether session is still active
  google.protobuf.Timestamp expires_at = 7;  // When this session expires
}

// Get Session
message GetSessionRequest {
  string id = 1;  // UUID of the session
}

// Update Session
message UpdateSessionRequest {
  string id = 1;  // UUID of the session
  optional string user_id = 2;  // User who owns this session
  optional string token_hash = 3;  // SHA256 hash of the access token
  optional string refresh_token_hash = 4;  // SHA256 hash of the refresh token
  optional string ip_address = 5;  // Client IP address
  optional string user_agent = 6;  // Client user agent string
  optional bool is_active = 7;  // Whether session is still active
  optional google.protobuf.Timestamp expires_at = 8;  // When this session expires
}

// Delete Session
message DeleteSessionRequest {
  string id = 1;  // UUID of the session
}

message DeleteSessionResponse {
  bool success = 1;
}

// List Sessions
message ListSessionsRequest {
  int32 page_size = 1;  // Results per page (default: 50, max: 100)
  string page_token = 2;  // Pagination token
  optional string search = 3;  // Search filter
}

message ListSessionsResponse {
  repeated Session items = 1;  // List of sessions
  string next_page_token = 2;  // Next page token
  int32 total_count = 3;  // Total count (if available)
}

// =============================================================================
// Data Models
// =============================================================================

message Session {
  string id = 1;  // UUID primary key
  string user_id = 2;  // User who owns this session
  string token_hash = 3;  // SHA256 hash of the access token
  optional string refresh_token_hash = 4;  // SHA256 hash of the refresh token
  optional string ip_address = 5;  // Client IP address
  optional string user_agent = 6;  // Client user agent string
  bool is_active = 7;  // Whether session is still active
  google.protobuf.Timestamp expires_at = 8;  // When this session expires
  string tenant_id = 9;  // Tenant context for this session
  string tenant_id = 10;  // Tenant identifier
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
}