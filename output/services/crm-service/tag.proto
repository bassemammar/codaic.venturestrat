// Tag Service - gRPC API
// Tag for categorizing shortlisted investors

syntax = "proto3";

package venturestrat.default.v1;

// Go package option
option go_package = "github.com/venturestrat/default/pkg/api/v1";

// Python generic services disabled
option py_generic_services = false;

// Common imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// Tag Service
// =============================================================================

service TagService {
  // CRUD operations
  rpc CreateTag(CreateTagRequest) returns (Tag);
  rpc GetTag(GetTagRequest) returns (Tag);
  rpc UpdateTag(UpdateTagRequest) returns (Tag);
  rpc DeleteTag(DeleteTagRequest) returns (DeleteTagResponse);

  // List operations
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
}

// =============================================================================
// Request/Response Messages
// =============================================================================

// Create Tag
message CreateTagRequest {
  string name = 1;
  optional string color = 2;  // Hex color code
}

// Get Tag
message GetTagRequest {
  string id = 1;  // UUID of the tag
}

// Update Tag
message UpdateTagRequest {
  string id = 1;  // UUID of the tag
  optional string name = 2;
  optional string color = 3;  // Hex color code
}

// Delete Tag
message DeleteTagRequest {
  string id = 1;  // UUID of the tag
}

message DeleteTagResponse {
  bool success = 1;
}

// List Tags
message ListTagsRequest {
  int32 page_size = 1;  // Results per page (default: 50, max: 100)
  string page_token = 2;  // Pagination token
  optional string search = 3;  // Search filter
}

message ListTagsResponse {
  repeated Tag items = 1;  // List of tags
  string next_page_token = 2;  // Next page token
  int32 total_count = 3;  // Total count (if available)
}

// =============================================================================
// Data Models
// =============================================================================

message Tag {
  string id = 1;  // UUID primary key
  string name = 2;
  optional string color = 3;  // Hex color code
  string tenant_id = 4;  // Tenant identifier
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}