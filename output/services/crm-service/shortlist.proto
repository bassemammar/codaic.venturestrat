// Shortlist Service - gRPC API
// User's investor pipeline — tracks shortlisted investors with CRM status

syntax = "proto3";

package venturestrat.default.v1;

// Go package option
option go_package = "github.com/venturestrat/default/pkg/api/v1";

// Python generic services disabled
option py_generic_services = false;

// Common imports
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// =============================================================================
// Shortlist Service
// =============================================================================

service ShortlistService {
  // CRUD operations
  rpc CreateShortlist(CreateShortlistRequest) returns (Shortlist);
  rpc GetShortlist(GetShortlistRequest) returns (Shortlist);
  rpc UpdateShortlist(UpdateShortlistRequest) returns (Shortlist);
  rpc DeleteShortlist(DeleteShortlistRequest) returns (DeleteShortlistResponse);

  // List operations
  rpc ListShortlists(ListShortlistsRequest) returns (ListShortlistsResponse);
}

// =============================================================================
// Request/Response Messages
// =============================================================================

// Create Shortlist
message CreateShortlistRequest {
  string user_id = 1;  // Auth user reference
  string investor_id = 2;  // Cross-service reference to investor-service Investor
  optional string stage_id = 3;  // Pipeline stage reference
  string status = 4;  // Current pipeline status
  optional string notes = 5;
  google.protobuf.Timestamp added_at = 6;  // When investor was shortlisted
}

// Get Shortlist
message GetShortlistRequest {
  string id = 1;  // UUID of the shortlist
}

// Update Shortlist
message UpdateShortlistRequest {
  string id = 1;  // UUID of the shortlist
  optional string user_id = 2;  // Auth user reference
  optional string investor_id = 3;  // Cross-service reference to investor-service Investor
  optional string stage_id = 4;  // Pipeline stage reference
  optional string status = 5;  // Current pipeline status
  optional string notes = 6;
  optional google.protobuf.Timestamp added_at = 7;  // When investor was shortlisted
}

// Delete Shortlist
message DeleteShortlistRequest {
  string id = 1;  // UUID of the shortlist
}

message DeleteShortlistResponse {
  bool success = 1;
}

// List Shortlists
message ListShortlistsRequest {
  int32 page_size = 1;  // Results per page (default: 50, max: 100)
  string page_token = 2;  // Pagination token
  optional string search = 3;  // Search filter
}

message ListShortlistsResponse {
  repeated Shortlist items = 1;  // List of shortlists
  string next_page_token = 2;  // Next page token
  int32 total_count = 3;  // Total count (if available)
}

// =============================================================================
// Data Models
// =============================================================================

message Shortlist {
  string id = 1;  // UUID primary key
  string user_id = 2;  // Auth user reference
  string investor_id = 3;  // Cross-service reference to investor-service Investor
  optional string stage_id = 4;  // Pipeline stage reference
  string status = 5;  // Current pipeline status
  optional string notes = 6;
  google.protobuf.Timestamp added_at = 7;  // When investor was shortlisted
  string tenant_id = 8;  // Tenant identifier
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}