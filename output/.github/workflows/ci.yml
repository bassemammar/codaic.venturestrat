name: VentureStrat CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: venturestrat
          POSTGRES_PASSWORD: venturestrat_dev_password
          POSTGRES_DB: venturestrat
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e cli/
          pip install -e sdk/venturestrat-models/
          pip install -e sdk/venturestrat-tenancy/
          pip install -e packages/venturestrat-service-base/
          cd services/investor-service && pip install -e ".[dev]"

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check services/investor-service/src/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy services/investor-service/src/ --ignore-missing-imports
        continue-on-error: true

      - name: Test (pytest)
        env:
          DATABASE_URL: postgresql://venturestrat:venturestrat_dev_password@localhost:5432/venturestrat
        run: |
          cd services/investor-service
          python -m pytest --cov --cov-report=term-missing --cov-fail-under=50

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/investor-service/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: services/investor-service/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx eslint src/ --ext .ts,.tsx
        continue-on-error: true

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Test (vitest)
        run: npx vitest run --coverage

      - name: Build
        run: npm run build
